services:
  postgres:
    image: postgres:16-alpine
    container_name: evodeck-postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: evodeck
      POSTGRES_PASSWORD: evodeck
      POSTGRES_DB: evodeck
    volumes:
      - evodeck_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U evodeck -d evodeck"]
      interval: 3s
      timeout: 3s
      retries: 20

volumes:
  evodeck_pg_data:
