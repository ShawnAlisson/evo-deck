services:
  postgres:
    image: postgres:16-alpine
    container_name: echoes-postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: echoes
      POSTGRES_PASSWORD: echoes
      POSTGRES_DB: echoes
    volumes:
      - echoes_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U echoes -d echoes"]
      interval: 3s
      timeout: 3s
      retries: 20

volumes:
  echoes_pg_data:
