  <title>EvoDeck architecture</title>
  <defs><filter id="s" x="0" y="0" width="1440" height="790" filterUnits="userSpaceOnUse"><feDropShadow dx="0" dy="9" stdDeviation="10" flood-opacity=".12"/></filter></defs>
